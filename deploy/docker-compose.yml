name: idempotency-service

x-core-service-environment: &core-service-environment
  SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-shard-0:5432/${POSTGRES_DB}
  SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
  SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
  APP_ROUTES_FILE: /app/config/routes.yaml
  APP_LISTENER_INBOUND_CONCURRENCY: "3"
  APP_LISTENER_REPLY_CONCURRENCY: "3"
  APP_SCHEDULER_BATCH_SIZE: "200"
  APP_SCHEDULER_REPLY_TIMEOUT_FIXED_DELAY: 15s
  APP_RESILIENCE_OUTBOX_RETRY_DELAY: 10s
  APP_RESILIENCE_DELIVERY_RETRY_DELAY: 10s
  APP_RESILIENCE_REPLY_TIMEOUT: 1m
  APP_RESILIENCE_LEASE_DURATION: 30s
  APP_RESILIENCE_MAX_ATTEMPTS: "5"
  APP_SECURITY_TOKENS_0_TOKEN: operator-token
  APP_SECURITY_TOKENS_0_PRINCIPAL: operator
  APP_SECURITY_TOKENS_0_ROLES_0: OPERATOR
  APP_SECURITY_TOKENS_0_ROLES_1: ADMIN
  APP_STORAGE_SHARDS_0_SHARD_ID: shard-0
  APP_STORAGE_SHARDS_0_URL: jdbc:postgresql://postgres-shard-0:5432/${POSTGRES_DB}
  APP_STORAGE_SHARDS_0_USERNAME: ${POSTGRES_USER}
  APP_STORAGE_SHARDS_0_PASSWORD: ${POSTGRES_PASSWORD}
  APP_STORAGE_SHARDS_1_SHARD_ID: shard-1
  APP_STORAGE_SHARDS_1_URL: jdbc:postgresql://postgres-shard-1:5432/${POSTGRES_DB}
  APP_STORAGE_SHARDS_1_USERNAME: ${POSTGRES_USER}
  APP_STORAGE_SHARDS_1_PASSWORD: ${POSTGRES_PASSWORD}
  APP_STORAGE_SHARDS_2_SHARD_ID: shard-2
  APP_STORAGE_SHARDS_2_URL: jdbc:postgresql://postgres-shard-2:5432/${POSTGRES_DB}
  APP_STORAGE_SHARDS_2_USERNAME: ${POSTGRES_USER}
  APP_STORAGE_SHARDS_2_PASSWORD: ${POSTGRES_PASSWORD}

x-core-service-common: &core-service-common
  image: ${CORE_SERVICE_IMAGE}
  restart: on-failure
  environment:
    <<: *core-service-environment
  depends_on:
    postgres-shard-0:
      condition: service_healthy
    postgres-shard-1:
      condition: service_healthy
    postgres-shard-2:
      condition: service_healthy
    redpanda-sender:
      condition: service_started
    redpanda-receiver:
      condition: service_started
  volumes:
    - ./config:/app/config
  expose:
    - "8080"

services:
  postgres-shard-0:
    image: postgres:16-alpine
    restart: on-failure
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "15432:5432"
    volumes:
      - postgres-shard-0-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres-shard-1:
    image: postgres:16-alpine
    restart: on-failure
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "15433:5432"
    volumes:
      - postgres-shard-1-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres-shard-2:
    image: postgres:16-alpine
    restart: on-failure
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "15434:5432"
    volumes:
      - postgres-shard-2-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redpanda-sender:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.10
    restart: on-failure
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --check=false
      - --node-id
      - "0"
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda-sender:9092
    expose:
      - "9092"

  redpanda-receiver:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.10
    restart: on-failure
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --check=false
      - --node-id
      - "0"
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda-receiver:9092
    expose:
      - "9092"

  core-service-1:
    <<: *core-service-common
    environment:
      <<: *core-service-environment
      APP_INSTANCE_ID: core-service-1
    ports:
      - "18080:8080"

  core-service-2:
    <<: *core-service-common
    environment:
      <<: *core-service-environment
      APP_INSTANCE_ID: core-service-2

  core-service-3:
    <<: *core-service-common
    environment:
      <<: *core-service-environment
      APP_INSTANCE_ID: core-service-3

  sender-simulator:
    image: ${SENDER_SIMULATOR_IMAGE}
    restart: on-failure
    environment:
      APP_ROUTES_FILE: /app/config/routes.yaml
      APP_SIMULATION_ENABLED: "true"
      APP_SIMULATION_INTEGRATION: system1-to-system2
      APP_SIMULATION_INTERVAL: 1s
      APP_SIMULATION_DUPLICATE_EVERY: "2"
      APP_SIMULATION_BURST_SIZE: "5"
      APP_SIMULATION_PAUSE: 1s
    depends_on:
      redpanda-sender:
        condition: service_started
      core-service-1:
        condition: service_started
    ports:
      - "18081:8081"
    volumes:
      - ./config:/app/config
      - ./sender-application.yml:/app/application.yml

  receiver-simulator:
    image: ${RECEIVER_SIMULATOR_IMAGE}
    restart: on-failure
    environment:
      APP_ROUTES_FILE: /app/config/routes.yaml
    depends_on:
      redpanda-receiver:
        condition: service_started
      core-service-1:
        condition: service_started
    ports:
      - "18082:8082"
    volumes:
      - ./config:/app/config
      - ./receiver-application.yml:/app/application.yml

  metrics-aggregator:
    image: ${METRICS_AGGREGATOR_IMAGE}
    restart: on-failure
    environment:
      SENDER_INSTANCES: sender-simulator:8081
      RECEIVER_INSTANCES: receiver-simulator:8082
    depends_on:
      sender-simulator:
        condition: service_started
      receiver-simulator:
        condition: service_started
    expose:
      - "9090"

  ui-console:
    image: ${UI_CONSOLE_IMAGE}
    restart: on-failure
    depends_on:
      core-service-1:
        condition: service_started
      sender-simulator:
        condition: service_started
      receiver-simulator:
        condition: service_started
      metrics-aggregator:
        condition: service_started
    ports:
      - "18083:80"

  prometheus:
    image: prom/prometheus:v2.54.1
    restart: on-failure
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    depends_on:
      core-service-1:
        condition: service_started
      core-service-2:
        condition: service_started
      core-service-3:
        condition: service_started
    ports:
      - "19090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

  grafana:
    image: grafana/grafana-oss:11.1.0
    restart: on-failure
    depends_on:
      prometheus:
        condition: service_started
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "18084:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana

volumes:
  postgres-shard-0-data:
  postgres-shard-1-data:
  postgres-shard-2-data:
  prometheus-data:
  grafana-data:
