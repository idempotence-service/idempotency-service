name: idempotency-stress

x-common-java-env: &common-java-env
  LOGGING_LEVEL_ORG_APACHE_KAFKA: WARN
  LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_KAFKA: WARN
  LOGGING_LEVEL_KAFKA: WARN

x-core-build: &core-build
  image: idempotency/core-service:stress
  build:
    context: ..
    dockerfile: core-service/Dockerfile

x-sender-build: &sender-build
  image: idempotency/sender-simulator:stress
  build:
    context: ..
    dockerfile: sender-simulator/Dockerfile

x-receiver-build: &receiver-build
  image: idempotency/receiver-simulator:stress
  build:
    context: ..
    dockerfile: receiver-simulator/Dockerfile

x-ui-build: &ui-build
  image: idempotency/ui-console:stress
  build:
    context: ..
    dockerfile: ui-console/Dockerfile

x-core-env: &core-env
  <<: *common-java-env
  JAVA_TOOL_OPTIONS: -Xms256m -Xmx768m -XX:+UseG1GC -XX:MaxGCPauseMillis=200
  APP_ROUTES_FILE: /app/config/routes.yaml
  APP_LISTENER_INBOUND_CONCURRENCY: "4"
  APP_LISTENER_REPLY_CONCURRENCY: "4"
  APP_SCHEDULER_POOL_SIZE: "8"
  APP_SCHEDULER_OUTBOX_WORKERS: "3"
  APP_SCHEDULER_DELIVERY_WORKERS: "3"
  APP_SCHEDULER_REPLY_TIMEOUT_WORKERS: "1"
  APP_SCHEDULER_BATCH_SIZE: "1000"
  APP_SCHEDULER_OUTBOX_FIXED_DELAY: 250ms
  APP_SCHEDULER_DELIVERY_FIXED_DELAY: 250ms
  APP_SCHEDULER_REPLY_TIMEOUT_FIXED_DELAY: 5s
  APP_RESILIENCE_OUTBOX_RETRY_DELAY: 2s
  APP_RESILIENCE_DELIVERY_RETRY_DELAY: 2s
  APP_RESILIENCE_REPLY_TIMEOUT: 5m
  APP_RESILIENCE_LEASE_DURATION: 15s
  APP_RESILIENCE_MAX_ATTEMPTS: "10"
  APP_SECURITY_TOKENS_0_TOKEN: operator-token
  APP_SECURITY_TOKENS_0_PRINCIPAL: operator
  APP_SECURITY_TOKENS_0_ROLES_0: OPERATOR
  APP_SECURITY_TOKENS_0_ROLES_1: ADMIN
  APP_STORAGE_SHARDS_0_SHARD_ID: shard-0
  APP_STORAGE_SHARDS_0_URL: jdbc:postgresql://postgres-shard-0:5432/idempotency
  APP_STORAGE_SHARDS_0_USERNAME: idempotency
  APP_STORAGE_SHARDS_0_PASSWORD: idempotency
  APP_STORAGE_SHARDS_0_MAXIMUM_POOL_SIZE: "4"
  APP_STORAGE_SHARDS_1_SHARD_ID: shard-1
  APP_STORAGE_SHARDS_1_URL: jdbc:postgresql://postgres-shard-1:5432/idempotency
  APP_STORAGE_SHARDS_1_USERNAME: idempotency
  APP_STORAGE_SHARDS_1_PASSWORD: idempotency
  APP_STORAGE_SHARDS_1_MAXIMUM_POOL_SIZE: "4"
  APP_STORAGE_SHARDS_2_SHARD_ID: shard-2
  APP_STORAGE_SHARDS_2_URL: jdbc:postgresql://postgres-shard-2:5432/idempotency
  APP_STORAGE_SHARDS_2_USERNAME: idempotency
  APP_STORAGE_SHARDS_2_PASSWORD: idempotency
  APP_STORAGE_SHARDS_2_MAXIMUM_POOL_SIZE: "4"

x-core-service: &core-service
  <<: *core-build
  restart: unless-stopped
  environment:
    <<: *core-env
  depends_on:
    postgres-shard-0:
      condition: service_healthy
    postgres-shard-1:
      condition: service_healthy
    postgres-shard-2:
      condition: service_healthy
    redpanda-sender:
      condition: service_started
    redpanda-receiver:
      condition: service_started
  volumes:
    - ./routes.stress.yaml:/app/config/routes.yaml:ro
  mem_limit: 1g
  cpus: 1.5
  networks:
    default:
      aliases:
        - core-service-1
  expose:
    - "8080"

x-sender-env: &sender-env
  <<: *common-java-env
  JAVA_TOOL_OPTIONS: -Xms128m -Xmx384m -XX:+UseG1GC -XX:MaxGCPauseMillis=200
  LOGGING_LEVEL_RU_ITMO_IDEMPOTENCY_SENDER_SERVICE_SIMULATIONSCHEDULER: WARN
  APP_ROUTES_FILE: /app/config/routes.yaml
  APP_SIMULATION_ENABLED: "true"
  APP_SIMULATION_INTEGRATION: system1-to-system2
  APP_SIMULATION_INTERVAL: 0ms
  APP_SIMULATION_DUPLICATE_EVERY: "2"
  APP_SIMULATION_BURST_SIZE: "100"
  APP_SIMULATION_PAUSE: 0ms
  APP_STATE_HISTORY_LIMIT: "200"

x-sender-service: &sender-service
  <<: *sender-build
  restart: unless-stopped
  environment:
    <<: *sender-env
  depends_on:
    redpanda-sender:
      condition: service_started
    core-service:
      condition: service_started
  volumes:
    - ./routes.stress.yaml:/app/config/routes.yaml:ro
  mem_limit: 512m
  cpus: 1.0
  expose:
    - "8081"

x-receiver-env: &receiver-env
  <<: *common-java-env
  JAVA_TOOL_OPTIONS: -Xms128m -Xmx384m -XX:+UseG1GC -XX:MaxGCPauseMillis=200
  APP_ROUTES_FILE: /app/config/routes.yaml
  APP_STATE_HISTORY_LIMIT: "200"

x-receiver-service: &receiver-service
  <<: *receiver-build
  restart: unless-stopped
  environment:
    <<: *receiver-env
  depends_on:
    redpanda-receiver:
      condition: service_started
    core-service:
      condition: service_started
  volumes:
    - ./routes.stress.yaml:/app/config/routes.yaml:ro
  mem_limit: 512m
  cpus: 1.0
  expose:
    - "8082"

services:
  postgres-shard-0:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: idempotency
      POSTGRES_USER: idempotency
      POSTGRES_PASSWORD: idempotency
    ports:
      - "15432:5432"
    volumes:
      - postgres-shard-0-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U idempotency -d idempotency"]
      interval: 10s
      timeout: 5s
      retries: 10
    mem_limit: 4g
    cpus: 2.0

  postgres-shard-1:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: idempotency
      POSTGRES_USER: idempotency
      POSTGRES_PASSWORD: idempotency
    ports:
      - "15433:5432"
    volumes:
      - postgres-shard-1-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U idempotency -d idempotency"]
      interval: 10s
      timeout: 5s
      retries: 10
    mem_limit: 4g
    cpus: 2.0

  postgres-shard-2:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: idempotency
      POSTGRES_USER: idempotency
      POSTGRES_PASSWORD: idempotency
    ports:
      - "15434:5432"
    volumes:
      - postgres-shard-2-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U idempotency -d idempotency"]
      interval: 10s
      timeout: 5s
      retries: 10
    mem_limit: 4g
    cpus: 2.0

  redpanda-sender:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.10
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "4"
      - --memory
      - 4G
      - --reserve-memory
      - 0M
      - --check=false
      - --node-id
      - "0"
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda-sender:9092
    expose:
      - "9092"
    mem_limit: 6g
    cpus: 4.0

  redpanda-receiver:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.10
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "4"
      - --memory
      - 4G
      - --reserve-memory
      - 0M
      - --check=false
      - --node-id
      - "0"
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda-receiver:9092
    expose:
      - "9092"
    mem_limit: 6g
    cpus: 4.0

  core-service:
    <<: *core-service
    ports:
      - "18080:8080"

  core-service-worker:
    <<: *core-service

  sender-simulator:
    <<: *sender-service
    ports:
      - "18081:8081"

  sender-worker:
    <<: *sender-service

  receiver-simulator:
    <<: *receiver-service
    ports:
      - "18082:8082"

  receiver-worker:
    <<: *receiver-service

  ui-console:
    <<: *ui-build
    restart: unless-stopped
    depends_on:
      core-service:
        condition: service_started
      sender-simulator:
        condition: service_started
      receiver-simulator:
        condition: service_started
    ports:
      - "18083:80"
    mem_limit: 256m
    cpus: 0.5

volumes:
  postgres-shard-0-data:
  postgres-shard-1-data:
  postgres-shard-2-data:
