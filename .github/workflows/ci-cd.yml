name: ci-cd

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Run backend tests
        run: mvn -B -f backend/pom.xml test

  frontend-test:
    name: Frontend tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Run frontend tests
        working-directory: frontend
        run: npm run test:ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  build-and-push:
    name: Build and push Docker images
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - backend-test
      - frontend-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_base: ${{ steps.meta.outputs.image_base }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Calculate image names
        id: meta
        run: |
          echo "image_base=$(echo ghcr.io/${GITHUB_REPOSITORY} | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
          echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image_base }}/backend:${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.image_base }}/backend:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image_base }}/frontend:${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.image_base }}/frontend:latest

  deploy:
    name: Deploy to VPS
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - build-and-push
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare deployment files
        env:
          IMAGE_BASE: ${{ needs.build-and-push.outputs.image_base }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          mkdir -p .deploy
          cp deploy/docker-compose.yml .deploy/docker-compose.yml
          cat > .deploy/.env <<DEPLOY_ENV
          BACKEND_IMAGE=${IMAGE_BASE}/backend:${IMAGE_TAG}
          FRONTEND_IMAGE=${IMAGE_BASE}/frontend:${IMAGE_TAG}
          POSTGRES_DB=${POSTGRES_DB}
          POSTGRES_USER=${POSTGRES_USER}
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          GHCR_USERNAME=${GHCR_USERNAME}
          GHCR_TOKEN=${GHCR_TOKEN}
          DEPLOY_ENV

      - name: Configure SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' '${{ secrets.DEPLOY_SSH_KEY }}' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p '${{ secrets.DEPLOY_PORT }}' -H '${{ secrets.DEPLOY_HOST }}' >> ~/.ssh/known_hosts

      - name: Copy deployment files to server
        run: |
          ssh -p '${{ secrets.DEPLOY_PORT }}' -i ~/.ssh/id_ed25519 '${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}' 'mkdir -p ~/apps/demo-monorepo'
          scp -P '${{ secrets.DEPLOY_PORT }}' -i ~/.ssh/id_ed25519 .deploy/docker-compose.yml .deploy/.env '${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:~/apps/demo-monorepo/'

      - name: Run deployment on server
        run: |
          ssh -p '${{ secrets.DEPLOY_PORT }}' -i ~/.ssh/id_ed25519 '${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}' <<'REMOTE_EOF'
          set -euo pipefail
          cd ~/apps/demo-monorepo
          set -a
          . ./.env
          set +a

          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
          docker compose pull
          docker compose up -d --remove-orphans

          echo 'Waiting for backend health endpoint...'
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8080/api/v1/ping > /dev/null; then
              echo 'Backend is healthy'
              break
            fi
            sleep 2
          done

          curl -fsS http://127.0.0.1:8080/api/v1/ping
          docker image prune -f
          REMOTE_EOF
