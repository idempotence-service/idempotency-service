name: ci-cd

on:
  push:
    branches:
      - release/01.001.00
  pull_request:
    branches:
      - release/01.001.00

jobs:
  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run backend tests
        run: ./gradlew test --no-daemon

  build-and-push:
    name: Build and push Docker images
    if: github.event_name == 'push' && github.ref == 'refs/heads/release/01.001.00'
    needs:
      - backend-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_base: ${{ steps.meta.outputs.image_base }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Calculate image names
        id: meta
        run: |
          echo "image_base=$(echo ghcr.io/${GITHUB_REPOSITORY} | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
          echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push core-service image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./core-service/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image_base }}/core-service:${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.image_base }}/core-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push sender-simulator image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./sender-simulator/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image_base }}/sender-simulator:${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.image_base }}/sender-simulator:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push receiver-simulator image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./receiver-simulator/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image_base }}/receiver-simulator:${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.image_base }}/receiver-simulator:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    if: github.event_name == 'push' && github.ref == 'refs/heads/release/01.001.00'
    needs:
      - build-and-push
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare deployment files
        env:
          IMAGE_BASE: ${{ needs.build-and-push.outputs.image_base }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          mkdir -p .deploy
          cp deploy/docker-compose.yml .deploy/docker-compose.yml
          cat > .deploy/.env <<DEPLOY_ENV
          CORE_SERVICE_IMAGE=${IMAGE_BASE}/core-service:${IMAGE_TAG}
          SENDER_SIMULATOR_IMAGE=${IMAGE_BASE}/sender-simulator:${IMAGE_TAG}
          RECEIVER_SIMULATOR_IMAGE=${IMAGE_BASE}/receiver-simulator:${IMAGE_TAG}
          POSTGRES_DB=${POSTGRES_DB}
          POSTGRES_USER=${POSTGRES_USER}
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          GHCR_USERNAME=${GHCR_USERNAME}
          GHCR_TOKEN=${GHCR_TOKEN}
          DEPLOY_ENV

      - name: Configure SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' '${{ secrets.DEPLOY_SSH_KEY }}' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p '${{ secrets.DEPLOY_PORT }}' -H '${{ secrets.DEPLOY_HOST }}' >> ~/.ssh/known_hosts

      - name: Copy deployment files to server
        run: |
          ssh -p '${{ secrets.DEPLOY_PORT }}' -i ~/.ssh/id_ed25519 '${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}' 'mkdir -p ~/apps/demo-monorepo'
          scp -P '${{ secrets.DEPLOY_PORT }}' -i ~/.ssh/id_ed25519 .deploy/docker-compose.yml .deploy/.env '${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:~/apps/demo-monorepo/'

      - name: Run deployment on server
        run: |
          ssh -p '${{ secrets.DEPLOY_PORT }}' -i ~/.ssh/id_ed25519 '${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}' <<'REMOTE_EOF'
          set -euo pipefail
          cd ~/apps/demo-monorepo
          set -a
          . ./.env
          set +a

          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
          docker compose pull
          docker compose up -d --remove-orphans

          echo 'Waiting for services to become available...'
          for i in $(seq 1 60); do
            core_ok=0
            sender_ok=0
            receiver_ok=0

            if curl -fsS http://127.0.0.1:8080/actuator/health > /dev/null; then
              core_ok=1
            fi

            if curl -fsS http://127.0.0.1:8081/actuator/health > /dev/null; then
              sender_ok=1
            fi

            if curl -fsS http://127.0.0.1:8082/actuator/health > /dev/null; then
              receiver_ok=1
            fi

            if [ "$core_ok" -eq 1 ] && [ "$sender_ok" -eq 1 ] && [ "$receiver_ok" -eq 1 ]; then
              echo 'All services are healthy'
              break
            fi

            sleep 2
          done

          curl -fsS http://127.0.0.1:8080/actuator/health
          curl -fsS http://127.0.0.1:8081/actuator/health
          curl -fsS http://127.0.0.1:8082/actuator/health
          docker image prune -f
          REMOTE_EOF
