server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /core/ {
        proxy_pass http://core-service-1:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization "Bearer operator-token";
    }

    location ^~ /config/ {
        proxy_pass http://core-service-1:8080/config/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization "Bearer operator-token";
    }

    location /api/sender/ {
        proxy_pass http://metrics-aggregator:9090/api/sender/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/receiver/ {
        proxy_pass http://metrics-aggregator:9090/api/receiver/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
