server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /core/ {
        proxy_pass http://core-service-1:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization "Bearer operator-token";
    }

    location = /config {
        proxy_pass http://core-service-1:8080/config;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization "Bearer operator-token";
    }

    location /config/ {
        proxy_pass http://core-service-1:8080/config/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization "Bearer operator-token";
        proxy_intercept_errors off;
    }

    location /api/sender/ {
        proxy_pass http://sender-simulator:8081/api/sender/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/receiver/ {
        proxy_pass http://receiver-simulator:8082/api/receiver/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
