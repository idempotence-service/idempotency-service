service:
  name: sender-service

kafka:
  routes:
    system3-to-system4:
      sender:
        producer:
          host: redpanda-sender:9092
          topic: sender.partner-b.events.inbound
          partitions: 12
          replicationFactor: 1
        consumer:
          host: redpanda-sender:9092
          topic: sender.partner-b.events.request-out
          group: sender-beta-replies
          partitions: 12
          replicationFactor: 1
      receiver:
        producer:
          host: redpanda-receiver:9092
          topic: receiver.partner-b.events.unique
          partitions: 12
          replicationFactor: 1
        consumer:
          host: redpanda-receiver:9092
          topic: receiver.partner-b.events.reply
          group: core-reply-consumer-beta
          partitions: 12
          replicationFactor: 1
      idempotency:
        enabled: true
